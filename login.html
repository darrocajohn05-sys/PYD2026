<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login</title>

<style>

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#0d6efd;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.login-box{
    width:350px;
    background:white;
    padding:30px;
    border-radius:12px;
    box-shadow:0 5px 20px rgba(0,0,0,.3);
}

h2{
    text-align:center;
    color:#0d6efd;
}

input{
    width:100%;
    padding:12px;
    margin-top:15px;
    border:1px solid #ccc;
    border-radius:6px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    margin-top:20px;
    background:#0d6efd;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

button:hover{
    background:#0b5ed7;
}

.back{
    background:#6c757d;
}

</style>

</head>

<body>

<div class="login-box">

<h2>Admin Login</h2>

<input
type="password"
id="password"
placeholder="Enter Password">

<button onclick="login()">

LOGIN

</button>

<button
class="back"
onclick="window.location='index.html'">

BACK

</button>

</div>

<script>

function login(){

    const password=document.getElementById("password").value;

    if(password==="PYD2026"){

        sessionStorage.setItem("admin","true");

        window.location="admin.html";

    }else{

        alert("Incorrect Password!");

    }

}

</script>

</body>
</html>
