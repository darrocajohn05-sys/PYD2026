.radio-group label{

.info{

<script>

const form=document.getElementById("registrationForm");

const workshops=[

"BAKING",

"NITO MAKING",

"ROSARY MAKING",

"BAMBOO MAKING",

"POTTERY MAKING",

"RUG MAKING",

"TABLE SKIRTING"

];

    function saveRegistration(receipt){

    let registrations =
    JSON.parse(localStorage.getItem("registrations")) || [];

    const registration={

        fullname:document.getElementById("fullname").value.trim(),

        age:document.getElementById("age").value,

        zone:document.getElementById("zone").value.trim(),

        gkk:document.getElementById("gkk").value.trim(),

        contact:document.getElementById("contact").value.trim(),

        guardian:document.getElementById("guardian").value.trim(),

        guardianContact:document.getElementById("guardianContact").value.trim(),

        food:document.querySelector('input[name="food"]:checked').value,

        otherFood:document.getElementById("otherFood").value.trim(),

        allergies:document.getElementById("allergies").value.trim(),

        shirt:document.getElementById("shirt").value,

        workshop:document.getElementById("workshop").value,

        receipt:receipt,

        date:new Date().toLocaleString()

    };

    // CHECK WORKSHOP LIMIT (25)

    let workshopCount = registrations.filter(r=>

        r.workshop===registration.workshop

    ).length;

    if(workshopCount>=25){

        alert("Sorry! This workshop is already FULL (25 participants).");

        return;

    }

    // CHECK ZONE LIMIT (2)

    let zoneCount = registrations.filter(r=>

        r.zone.toLowerCase()===registration.zone.toLowerCase()

    ).length;

    if(zoneCount>=2){

        alert("Only 2 participants are allowed from the same Zone / GKK.");

        return;

    }

    // SAVE

    registrations.push(registration);

    localStorage.setItem(

        "registrations",

        JSON.stringify(registrations)

    );

    alert("✅ Registration Successful!");

    form.reset();

    window.scrollTo({

        top:0,

        behavior:"smooth"

    });

}

form.addEventListener("submit",function(e){

    e.preventDefault();

    if(document.getElementById("workshop").value==""){

        alert("Please select a workshop.");

        return;

    }

    const file=document.getElementById("receipt").files[0];

    if(file){

        const reader=new FileReader();

        reader.onload=function(){

            saveRegistration(reader.result);

        };

        reader.readAsDataURL(file);

    }else{

        saveRegistration("");

    }

});

function saveRegistration(receipt){

    let registrations =
    JSON.parse(localStorage.getItem("registrations")) || [];

    const food =
    document.querySelector('input[name="food"]:checked').value;

    const newRegistration = {

        fullname: document.getElementById("fullname").value.trim(),

        age: document.getElementById("age").value,

        zone: document.getElementById("zone").value.trim(),

        gkk: document.getElementById("gkk").value.trim(),

        contact: document.getElementById("contact").value.trim(),

        guardian: document.getElementById("guardian").value.trim(),

        guardianContact: document.getElementById("guardianContact").value.trim(),

        food: food,

        otherFood: document.getElementById("otherFood").value.trim(),

        allergies: document.getElementById("allergies").value.trim(),

        shirt: document.getElementById("shirt").value,

        workshop: document.getElementById("workshop").value,

        receipt: receipt,

        date: new Date().toLocaleString()

    };

    if(!validateRegistration(
        newRegistration.workshop,
        newRegistration.zone
    )){
        return;
    }

    registrations.push(newRegistration);

    localStorage.setItem(
        "registrations",
        JSON.stringify(registrations)
    );

    success();

}

    if(file){

            saveRegistration(reader.result);

        };

    }else{

});
